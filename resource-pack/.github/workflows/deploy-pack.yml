name: Publish Resource Pack

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate resource pack
        run: |
          test -d assets || {
            echo "ERROR: Missing assets folder"
            exit 1
          }

          test -f pack.mcmeta || {
            echo "ERROR: Missing pack.mcmeta"
            exit 1
          }

      - name: Build resource pack
        run: |
          mkdir -p public

          if [ -f pack.png ]; then
            zip -r public/resourcepack.zip assets pack.mcmeta pack.png
          else
            zip -r public/resourcepack.zip assets pack.mcmeta
          fi

          sha1sum public/resourcepack.zip \
            | awk '{print $1}' \
            > public/resourcepack.sha1

          echo "<h1>Minecraft Resource Pack</h1>" > public/index.html
          echo "<p><a href='resourcepack.zip'>Download resource pack</a></p>" >> public/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
